name: Scheduled VCP Scan

on:
  workflow_dispatch:
  schedule:
    - cron: "30 8 * * *"
    - cron: "30 17 * * *"

permissions:
  contents: write

jobs:
  run-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run VCP scan
        run: |
          python - <<'PY'
          from vcp_daily_weekly_with_charts import build_outputs

          outputs = build_outputs(
              universe_path="nifty500.csv",
              outdir="outputs",
              export_all_ticker_charts=True
          )
          print(outputs)
          PY

      - name: Commit updated outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add outputs/
          git diff --cached --quiet || git commit -m "Auto-update VCP outputs [skip ci]"
          git push
