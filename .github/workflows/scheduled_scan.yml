name: Scheduled VCP Scan

on:
  workflow_dispatch:
  schedule:
    - cron: "30 8 * * *"
    - cron: "30 17 * * *"

permissions:
  contents: write

jobs:
  run-scan:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: |
          pip install -r requirements.txt

      - name: Run scan
        run: |
          python - <<'PY'
          from vcp_engine_change_tracking import build_outputs

          build_outputs(
              universe_path="nifty500.csv",
              outdir="outputs",
              export_all_ticker_charts=True
          )
          PY

      - name: Commit outputs
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add outputs/
          git diff --cached --quiet || git commit -m "Auto update outputs"
          git push
