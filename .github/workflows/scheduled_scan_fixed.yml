name: Update VCP Outputs

on:
  workflow_dispatch:
  schedule:
    - cron: "45 16 * * 1-5"

permissions:
  contents: write

concurrency:
  group: update-vcp-outputs
  cancel-in-progress: true

jobs:
  update-outputs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Sync to latest main
        run: |
          git fetch origin main
          git checkout main
          git reset --hard origin/main

      - name: Prepare folders
        run: |
          mkdir -p outputs
          mkdir -p outputs/charts/daily
          mkdir -p outputs/charts/weekly

      - name: Generate outputs
        run: |
          set -e

          if [ ! -f universe.csv ]; then
            echo "universe.csv not found in repo root"
            exit 1
          fi

          if [ -f vcp_engine.py ]; then
            python vcp_engine.py --universe universe.csv --outdir outputs
          fi

          if [ -f vcp_engine_change_tracking.py ]; then
            python vcp_engine_change_tracking.py --universe universe.csv --outdir outputs
          fi

          if [ -f vcp_engine_price_moves.py ]; then
            python vcp_engine_price_moves.py --universe universe.csv --outdir outputs
          fi

      - name: Commit and push outputs
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add outputs/

          if git diff --cached --quiet; then
            echo "No output changes to commit"
            exit 0
          fi

          git commit -m "Auto update outputs"
          git push origin main
